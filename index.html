<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fajr Wake-Up - Squat Challenge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
      min-height: 100vh;
      color: #fff;
      padding: 15px;
      touch-action: manipulation;
    }
    .container { max-width: 500px; margin: 0 auto; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #ffd700; }
    .subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
    .location-btn { background: #3498db; color: #fff; padding: 8px 16px; border: none; border-radius: 20px; font-size: 0.85rem; margin-bottom: 15px; cursor: pointer; }
    .location-btn:disabled { opacity: 0.6; }
    .fajr-time { background: rgba(255,215,0,0.15); padding: 10px 20px; border-radius: 25px; display: inline-block; margin-bottom: 15px; }
    .fajr-time-label { font-size: 0.8rem; color: #aaa; }
    .fajr-time-value { font-size: 1.8rem; font-weight: bold; color: #ffd700; }
    .counter { font-size: 3.5rem; font-weight: bold; color: #ffd700; margin: 15px 0; }
    .counter span { font-size: 1.2rem; color: #aaa; }
    .progress { width: 100%; height: 16px; background: rgba(255,255,255,0.2); border-radius: 8px; overflow: hidden; margin: 15px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ff6b6b); width: 0%; transition: width 0.3s; }
    .video-wrap { display: none; margin: 15px 0; border-radius: 12px; overflow: hidden; }
    .video-wrap.active { display: block; }
    #video { width: 100%; max-width: 350px; transform: scaleX(-1); border-radius: 12px; }
    #canvas { position: absolute; top: 0; left: 0; width: 100%; max-width: 350px; transform: scaleX(-1); }
    .video-container { position: relative; display: inline-block; }
    .btn {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 8px;
      transition: transform 0.15s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-start { background: linear-gradient(135deg, #ffd700, #ff9500); color: #000; font-weight: 600; }
    .btn-stop { background: linear-gradient(135deg, #ff6b6b, #ff4757); color: #fff; font-weight: 600; }
    .btn-test { background: linear-gradient(135deg, #ff4757, #c0392b); color: #fff; font-weight: 600; }
    .message { font-size: 1.1rem; margin: 15px 0; min-height: 25px; }
    .message.alarm { color: #ff6b6b; animation: pulse 0.5s infinite; }
    .message.success { color: #2ed573; font-weight: 600; }
    .message.waiting { color: #ffd700; }
    .message.info { color: #3498db; font-size: 0.9rem; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .instructions { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: left; }
    .instructions h3 { color: #ffd700; margin-bottom: 8px; font-size: 1rem; }
    .instructions li { padding: 4px 0; font-size: 0.85rem; color: #ccc; }
    .hidden { display: none !important; }
    .location-status { font-size: 0.8rem; color: #888; margin-top: 5px; }
    
    @media (max-width: 400px) {
      h1 { font-size: 1.3rem; }
      .counter { font-size: 2.8rem; }
      .btn { padding: 12px 24px; font-size: 0.95rem; }
      #video, #canvas { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌅 Fajr Wake-Up</h1>
    <p class="subtitle">Complete 10 squats to silence the alarm!</p>
    
    <button class="location-btn" id="locationBtn">📍 Get My Location</button>
    <p class="location-status" id="locationStatus"></p>
    
    <div class="fajr-time" id="fajrTimeBox" style="display:none">
      <div class="fajr-time-label">FAJR</div>
      <div class="fajr-time-value" id="fajrValue">--:--</div>
    </div>
    
    <div class="counter"><span id="count">0</span> <span>/ 10</span></div>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
    <p class="message" id="message">Click "Test Alarm" or wait for Fajr</p>
    
    <div class="video-container" id="videoContainer">
      <video id="video" playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    
    <div>
      <button class="btn btn-test" id="testBtn">🔔 Test Alarm</button>
      <button class="btn btn-stop hidden" id="stopBtn">⏹ Stop</button>
    </div>
    
    <div class="instructions">
      <h3>How it works:</h3>
      <ul>
        <li>Click location to get Fajr time for your area</li>
        <li>When Fajr arrives, alarm goes off</li>
        <li>Allow camera, stand in frame (full body)</li>
        <li>Do 10 squats to dismiss alarm</li>
      </ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"></script>

  <script>
    let alarmActive = false;
    let sitUpCount = 0;
    let pose = null;
    let camera = null;
    let inSitUp = false;
    let lastAngle = null;
    let sitUpComplete = false;
    let userLat = null, userLon = null;
    let fajrTime = null;
    let alarmTriggered = false;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count');
    const progressEl = document.getElementById('progress');
    const messageEl = document.getElementById('message');
    const testBtn = document.getElementById('testBtn');
    const stopBtn = document.getElementById('stopBtn');
    const videoContainer = document.getElementById('videoContainer');
    const locationBtn = document.getElementById('locationBtn');
    const locationStatus = document.getElementById('locationStatus');
    const fajrTimeBox = document.getElementById('fajrTimeBox');
    const fajrValue = document.getElementById('fajrValue');
    
    // Get user location
    locationBtn.addEventListener('click', () => {
      locationBtn.disabled = true;
      locationStatus.textContent = 'Getting location...';
      
      if (!navigator.geolocation) {
        locationStatus.textContent = 'Geolocation not supported';
        locationBtn.disabled = false;
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          locationStatus.textContent = `📍 ${userLat.toFixed(2)}, ${userLon.toFixed(2)}`;
          calculateFajrTime();
        },
        (err) => {
          locationStatus.textContent = 'Location denied - using default';
          calculateFajrTime(40.7128, -74.0060); // NYC default
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
    
    // Calculate Fajr time using simple formula
    function calculateFajrTime(lat, lon) {
      if (lat === undefined) lat = userLat;
      if (lon === undefined) lon = userLon;
      
      const now = new Date();
      const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
      
      // Simplified Fajr calculation (approximate)
      const declination = 23.45 * Math.sin((360/365) * (dayOfYear - 81) * Math.PI / 180);
      const latRad = lat * Math.PI / 180;
      const decRad = declination * Math.PI / 180;
      
      let hourAngle = Math.acos(-Math.tan(latRad) * Math.tan(decRad)) * 180 / Math.PI;
      if (isNaN(hourAngle)) hourAngle = 90;
      
      // Fajr is about 1.5 hours before sunrise
      const sunriseHour = 12 - hourAngle / 15;
      const fajrHour = sunriseHour - 1.5;
      
      const fajrHours = Math.floor(fajrHour);
      const fajrMins = Math.floor((fajrHour - fajrHours) * 60);
      
      fajrTime = new Date(now);
      fajrTime.setHours(fajrHours, fajrMins, 0, 0);
      
      // If Fajr already passed today, set for tomorrow
      if (fajrTime < now) {
        fajrTime.setDate(fajrTime.getDate() + 1);
      }
      
      fajrValue.textContent = fajrTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      fajrTimeBox.style.display = 'inline-block';
      locationStatus.textContent = '✓ Fajr time calculated';
      
      // Check if Fajr is within 5 minutes
      checkFajrAlarm();
    }
    
    function checkFajrAlarm() {
      if (alarmTriggered || !fajrTime) return;
      
      const now = new Date();
      const diff = fajrTime - now;
      
      if (diff <= 0) {
        // Fajr time! Start alarm
        startAlarm();
        alarmTriggered = true;
      }
    }
    
    setInterval(checkFajrAlarm, 30000);
    
    function playAlarm() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      function playTone() {
        if (!alarmActive) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
        setTimeout(playTone, 500);
      }
      playTone();
    }
    
    function stopAlarm() { alarmActive = false; }
    
    function initPose() {
      pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
      });
      
      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      
      pose.onResults(onPoseResults);
    }
    
    function onPoseResults(results) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (results.poseLandmarks) {
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffd700', lineWidth: 3});
        drawLandmarks(ctx, results.poseLandmarks, {color: '#ff6b6b', lineWidth: 2, radius: 4});
        detectSquat(results.poseLandmarks);
      }
    }
    
    function detectSquat(landmarks) {
      if (!alarmActive) return;
      
      const leftHip = landmarks[23];
      const leftKnee = landmarks[25];
      const leftAnkle = landmarks[27];
      const rightHip = landmarks[24];
      const rightKnee = landmarks[26];
      const rightAnkle = landmarks[28];
      
      // Use whichever side is more visible
      let hip, knee, ankle;
      const leftVis = (leftHip?.visibility || 0) + (leftKnee?.visibility || 0) + (leftAnkle?.visibility || 0);
      const rightVis = (rightHip?.visibility || 0) + (rightKnee?.visibility || 0) + (rightAnkle?.visibility || 0);
      
      if (leftVis >= rightVis) {
        hip = leftHip; knee = leftKnee; ankle = leftAnkle;
      } else {
        hip = rightHip; knee = rightKnee; ankle = rightAnkle;
      }
      
      if (!hip || !knee || !ankle) return;
      
      const angle = calculateAngle(
        {x: hip.x, y: hip.y},
        {x: knee.x, y: knee.y},
        {x: ankle.x, y: ankle.y}
      );
      
      // Squat: knee angle < 100 when down, > 160 when standing
      if (angle < 100 && !inSitUp) {
        inSitUp = true;
        lastAngle = angle;
      } else if (angle > 160 && inSitUp && lastAngle < 100) {
        if (!sitUpComplete) {
          sitUpCount++;
          updateCount();
          sitUpComplete = true;
          if (sitUpCount >= 10) alarmSolved();
        }
      } else if (angle > 170) {
        sitUpComplete = false;
      }
      
      if (angle > 120) lastAngle = angle;
    }
    
    function calculateAngle(a, b, c) {
      const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(rad * 180 / Math.PI);
      return angle > 180 ? 360 - angle : angle;
    }
    
    function updateCount() {
      countEl.textContent = sitUpCount;
      progressEl.style.width = (sitUpCount * 10) + '%';
      messageEl.textContent = `${10 - sitUpCount} more to go!`;
    }
    
    function alarmSolved() {
      stopAlarm();
      messageEl.textContent = '🎉 Done! Good morning!';
      messageEl.className = 'message success';
      if (camera) { camera.stop(); camera = null; }
      videoContainer.classList.remove('active');
      stopBtn.classList.add('hidden');
      testBtn.classList.remove('hidden');
    }
    
    async function startAlarm() {
      alarmActive = true;
      sitUpCount = 0;
      inSitUp = false;
      sitUpComplete = false;
      lastAngle = null;
      
      countEl.textContent = '0';
      progressEl.style.width = '0%';
      messageEl.textContent = '🔔 ALARM! Do 10 squats!';
      messageEl.className = 'message alarm';
      
      testBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
      videoContainer.classList.add('active');
      
      try {
        initPose();
        
        camera = new Camera(video, {
          onFrame: async () => {
            if (pose) await pose.send({image: video});
          },
          width: 480,
          height: 360
        });
        
        await camera.start();
        playAlarm();
      } catch (e) {
        messageEl.textContent = 'Error: ' + e.message;
      }
    }
    
    function stopAlarmHandler() {
      stopAlarm();
      messageEl.textContent = 'Alarm stopped. Click "Test Alarm" to try again.';
      messageEl.className = 'message waiting';
      if (camera) { camera.stop(); camera = null; }
      videoContainer.classList.remove('active');
      stopBtn.classList.add('hidden');
      testBtn.classList.remove('hidden');
    }
    
    testBtn.addEventListener('click', startAlarm);
    stopBtn.addEventListener('click', stopAlarmHandler);
  </script>
</body>
</html>
