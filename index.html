<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fajr Wake-Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
      min-height: 100vh;
      color: #fff;
      padding: 15px;
      touch-action: manipulation;
    }
    .container { max-width: 500px; margin: 0 auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .back-btn { background: none; border: none; color: #ffd700; font-size: 1.5rem; cursor: pointer; padding: 5px; }
    .back-btn:disabled { opacity: 0; }
    
    h1 { font-size: 1.5rem; color: #ffd700; text-align: center; }
    .subtitle { font-size: 0.9rem; color: #aaa; text-align: center; margin-bottom: 20px; }
    
    .screen { display: none; }
    .screen.active { display: block; }
    
    /* Challenge Selection */
    .challenge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .challenge-card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px 15px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      border: 2px solid transparent;
      text-align: center;
    }
    .challenge-card:active { transform: scale(0.96); }
    .challenge-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.15); }
    .challenge-card-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .challenge-card-title { font-weight: 600; margin-bottom: 4px; }
    .challenge-card-desc { font-size: 0.75rem; color: #aaa; }
    
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .btn {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, #ffd700, #ff9500); color: #000; font-weight: 600; }
    .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
    .btn-stop { background: linear-gradient(135deg, #ff6b6b, #ff4757); color: #fff; font-weight: 600; }
    .btn:disabled { opacity: 0.5; }
    
    /* Exercise Screen */
    .location-section { text-align: center; margin-bottom: 20px; }
    .location-btn { background: #3498db; color: #fff; padding: 10px 20px; border: none; border-radius: 25px; font-size: 0.9rem; cursor: pointer; }
    .location-btn:disabled { opacity: 0.6; }
    .location-status { font-size: 0.8rem; color: #888; margin-top: 8px; }
    
    .fajr-display { background: rgba(255,215,0,0.15); padding: 15px 25px; border-radius: 20px; display: inline-block; margin-bottom: 20px; text-align: center; }
    .fajr-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .fajr-time { font-size: 2rem; font-weight: bold; color: #ffd700; }
    .fajr-countdown { font-size: 0.85rem; color: #888; margin-top: 5px; }
    
    .counter-display { text-align: center; margin: 20px 0; }
    .counter { font-size: 4rem; font-weight: bold; color: #ffd700; }
    .counter span { font-size: 1.5rem; color: #aaa; }
    .progress { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; margin: 15px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ff6b6b); width: 0%; transition: width 0.3s; }
    
    .video-container { position: relative; display: inline-block; margin: 15px 0; border-radius: 12px; overflow: hidden; }
    .video-container video { width: 100%; max-width: 350px; transform: scaleX(-1); border-radius: 12px; }
    .video-container canvas { position: absolute; top: 0; left: 0; width: 100%; max-width: 350px; transform: scaleX(-1); }
    
    /* Quiz Screen */
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .quiz-progress { font-size: 1rem; color: #aaa; }
    .quiz-question { font-size: 1.3rem; padding: 25px; background: rgba(255,255,255,0.1); border-radius: 15px; margin-bottom: 20px; }
    .quiz-options { display: grid; gap: 10px; }
    .quiz-option {
      padding: 16px;
      background: rgba(255,255,255,0.1);
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .quiz-option:active { transform: scale(0.98); }
    .quiz-option.correct { background: rgba(46, 213, 115, 0.3); border-color: #2ed573; }
    .quiz-option.wrong { background: rgba(255, 107, 107, 0.3); border-color: #ff6b6b; }
    .quiz-option.disabled { pointer-events: none; }
    
    .message { text-align: center; font-size: 1.1rem; margin: 15px 0; min-height: 25px; }
    .message.alarm { color: #ff6b6b; animation: pulse 0.5s infinite; }
    .message.success { color: #2ed573; font-weight: 600; }
    .message.waiting { color: #ffd700; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .hidden { display: none !important; }
    
    @media (max-width: 400px) {
      h1 { font-size: 1.3rem; }
      .counter { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" id="backBtn">←</button>
      <h1>🌅 Fajr Wake-Up</h1>
      <div style="width: 30px;"></div>
    </div>
    
    <!-- Challenge Selection Screen -->
    <div class="screen active" id="selectScreen">
      <p class="subtitle">Choose a challenge to dismiss the alarm</p>
      
      <div class="challenge-grid">
        <div class="challenge-card" data-challenge="squat">
          <div class="challenge-card-icon">🏋️</div>
          <div class="challenge-card-title">10 Squats</div>
          <div class="challenge-card-desc">Do 10 squats</div>
        </div>
        <div class="challenge-card" data-challenge="jumpingjack">
          <div class="challenge-card-icon">⭐</div>
          <div class="challenge-card-title">20 Jumping Jacks</div>
          <div class="challenge-card-desc">Full body workout</div>
        </div>
        <div class="challenge-card" data-challenge="math">
          <div class="challenge-card-icon">🔢</div>
          <div class="challenge-card-title">Math Quiz</div>
          <div class="challenge-card-desc">5 math problems</div>
        </div>
        <div class="challenge-card" data-challenge="geo">
          <div class="challenge-card-icon">🌍</div>
          <div class="challenge-card-title">Geography Quiz</div>
          <div class="challenge-card-desc">5 geography questions</div>
        </div>
      </div>
      
      <button class="btn btn-primary" id="startChallengeBtn" disabled>Start Challenge →</button>
    </div>
    
    <!-- Exercise Screen -->
    <div class="screen" id="exerciseScreen">
      <div class="location-section">
        <button class="location-btn" id="locationBtn">📍 Set Location for Fajr Time</button>
        <p class="location-status" id="locationStatus"></p>
      </div>
      
      <div class="fajr-display" id="fajrDisplay">
        <div class="fajr-label">Fajr Time</div>
        <div class="fajr-time" id="fajrValue">--:--</div>
        <div class="fajr-countdown" id="fajrCountdown"></div>
      </div>
      
      <p class="message" id="message">Set location or click Test to start</p>
      
      <div class="counter-display">
        <div class="counter"><span id="count">0</span><span> / <span id="target">10</span></span></div>
        <div class="progress"><div class="progress-fill" id="progress"></div></div>
      </div>
      
      <div class="video-container" id="videoContainer">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
      </div>
      
      <div class="btn-row">
        <button class="btn btn-primary" id="testBtn">🔔 Test Alarm</button>
        <button class="btn btn-stop hidden" id="stopBtn">⏹ Stop</button>
      </div>
    </div>
    
    <!-- Quiz Screen -->
    <div class="screen" id="quizScreen">
      <div class="quiz-header">
        <span class="quiz-progress">Question <span id="qNum">1</span>/5</span>
        <span class="quiz-progress">Score: <span id="qScore">0</span>/5</span>
      </div>
      
      <div class="quiz-question" id="qText">Loading...</div>
      <div class="quiz-options" id="qOptions"></div>
      
      <p class="message" id="quizMessage"></p>
      
      <div class="btn-row">
        <button class="btn btn-primary hidden" id="nextQBtn">Next →</button>
        <button class="btn btn-primary hidden" id="restartQuizBtn">Try Again</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"></script>

  <script>
    // State
    let currentScreen = 'select';
    let selectedChallenge = null;
    let alarmActive = false;
    let repCount = 0;
    let targetReps = 10;
    let pose = null;
    let camera = null;
    let inRep = false;
    let lastAngle = null;
    let repComplete = false;
    let userLat = null, userLon = null;
    let fajrTime = null;
    let alarmTriggered = false;
    
    // Quiz
    let currentQuestion = 0;
    let quizScore = 0;
    let quizAnswered = false;
    
    const mathQuestions = [
      { q: "What is 7 × 8?", options: ["54", "56", "58", "64"], correct: 1 },
      { q: "What is 144 ÷ 12?", options: ["10", "11", "12", "14"], correct: 2 },
      { q: "What is 15 + 28?", options: ["41", "43", "45", "42"], correct: 1 },
      { q: "What is 100 - 37?", options: ["63", "62", "64", "61"], correct: 0 },
      { q: "What is 9²?", options: ["72", "81", "90", "99"], correct: 1 },
      { q: "What is 6 × 12?", options: ["68", "72", "76", "82"], correct: 1 },
      { q: "What is 200 ÷ 5?", options: ["35", "40", "45", "50"], correct: 1 },
      { q: "What is 23 + 47?", options: ["68", "70", "72", "74"], correct: 1 },
    ];
    
    const geoQuestions = [
      { q: "What is the capital of France?", options: ["London", "Paris", "Berlin", "Madrid"], correct: 1 },
      { q: "Which river is the longest?", options: ["Amazon", "Nile", "Yangtze", "Mississippi"], correct: 1 },
      { q: "What is the largest country by area?", options: ["China", "USA", "Canada", "Russia"], correct: 3 },
      { q: "Which continent has the most countries?", options: ["Asia", "Europe", "Africa", "South America"], correct: 2 },
      { q: "What is the capital of Japan?", options: ["Seoul", "Beijing", "Tokyo", "Bangkok"], correct: 2 },
      { q: "Which ocean is the largest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
      { q: "What is the capital of Australia?", options: ["Sydney", "Melbourne", "Canberra", "Perth"], correct: 2 },
      { q: "Which country has the most people?", options: ["USA", "India", "China", "Indonesia"], correct: 1 },
    ];
    
    // DOM Elements
    const screens = {
      select: document.getElementById('selectScreen'),
      exercise: document.getElementById('exerciseScreen'),
      quiz: document.getElementById('quizScreen')
    };
    
    const backBtn = document.getElementById('backBtn');
    const challengeCards = document.querySelectorAll('.challenge-card');
    const startChallengeBtn = document.getElementById('startChallengeBtn');
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count');
    const targetEl = document.getElementById('target');
    const progressEl = document.getElementById('progress');
    const messageEl = document.getElementById('message');
    const testBtn = document.getElementById('testBtn');
    const stopBtn = document.getElementById('stopBtn');
    const videoContainer = document.getElementById('videoContainer');
    const locationBtn = document.getElementById('locationBtn');
    const locationStatus = document.getElementById('locationStatus');
    const fajrValue = document.getElementById('fajrValue');
    const fajrDisplay = document.getElementById('fajrDisplay');
    const fajrCountdown = document.getElementById('fajrCountdown');
    
    const qNum = document.getElementById('qNum');
    const qScore = document.getElementById('qScore');
    const qText = document.getElementById('qText');
    const qOptions = document.getElementById('qOptions');
    const quizMessage = document.getElementById('quizMessage');
    const nextQBtn = document.getElementById('nextQBtn');
    const restartQuizBtn = document.getElementById('restartQuizBtn');
    
    // Navigation
    function showScreen(screen) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[screen].classList.add('active');
      currentScreen = screen;
      updateBackBtn();
    }
    
    function updateBackBtn() {
      backBtn.disabled = currentScreen === 'select';
    }
    
    backBtn.addEventListener('click', () => {
      if (currentScreen === 'exercise') {
        stopAlarm();
        showScreen('select');
      } else if (currentScreen === 'quiz') {
        showScreen('select');
      }
    });
    
    // Challenge Selection
    challengeCards.forEach(card => {
      card.addEventListener('click', () => {
        challengeCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedChallenge = card.dataset.challenge;
        startChallengeBtn.disabled = false;
      });
    });
    
    startChallengeBtn.addEventListener('click', () => {
      if (selectedChallenge === 'math' || selectedChallenge === 'geo') {
        showScreen('quiz');
        startQuiz();
      } else {
        showScreen('exercise');
        targetReps = selectedChallenge === 'jumpingjack' ? 20 : 10;
        targetEl.textContent = targetReps;
      }
    });
    
    // Location & Fajr
    locationBtn.addEventListener('click', () => {
      locationBtn.disabled = true;
      locationStatus.textContent = 'Getting location...';
      
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          locationStatus.textContent = `📍 ${userLat.toFixed(2)}°, ${userLon.toFixed(2)}°`;
          getFajrFromAPI();
        },
        (err) => {
          locationStatus.textContent = 'Location denied';
          locationBtn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
    
    async function getFajrFromAPI() {
      try {
        const today = new Date();
        const dateStr = `${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`;
        
        const response = await fetch(
          `https://api.aladhan.com/v1/timings/${dateStr}?latitude=${userLat}&longitude=${userLon}&method=1`
        );
        const data = await response.json();
        
        if (data.code === 200) {
          const fajrStr = data.data.timings.Fajr;
          const [fajrHours, fajrMins] = fajrStr.split(':').map(Number);
          
          fajrTime = new Date();
          fajrTime.setHours(fajrHours, fajrMins, 0, 0);
          
          const now = new Date();
          if (fajrTime < now) {
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tmrStr = `${tomorrow.getDate()}-${tomorrow.getMonth()+1}-${tomorrow.getFullYear()}`;
            const resp2 = await fetch(
              `https://api.aladhan.com/v1/timings/${tmrStr}?latitude=${userLat}&longitude=${userLon}&method=1`
            );
            const data2 = await resp2.json();
            if (data2.code === 200) {
              const tf = data2.data.timings.Fajr.split(':').map(Number);
              fajrTime = tomorrow;
              fajrTime.setHours(tf[0], tf[1], 0, 0);
            }
          }
          
          fajrValue.textContent = fajrTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          locationStatus.textContent = '✓ Fajr time loaded';
          
          updateCountdown();
          setInterval(updateCountdown, 60000);
          checkFajrAlarm();
        }
      } catch (e) {
        locationStatus.textContent = 'API error';
        locationBtn.disabled = false;
      }
    }
    
    function updateCountdown() {
      if (!fajrTime) return;
      const now = new Date();
      const diff = fajrTime - now;
      
      if (diff > 0) {
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        fajrCountdown.textContent = `in ${hours}h ${mins}m`;
      } else {
        fajrCountdown.textContent = 'Time!';
      }
    }
    
    function checkFajrAlarm() {
      if (alarmTriggered || !fajrTime) return;
      const now = new Date();
      if (fajrTime <= now) {
        startAlarm();
        alarmTriggered = true;
      }
    }
    setInterval(checkFajrAlarm, 30000);
    
    // Exercise Detection
    function playAlarm() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playTone() {
        if (!alarmActive) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
        setTimeout(playTone, 500);
      }
      playTone();
    }
    function stopAlarm() { 
      alarmActive = false; 
      if (camera) { camera.stop(); camera = null; }
    }
    
    function initPose() {
      pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
      });
      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      pose.onResults(onPoseResults);
    }
    
    function onPoseResults(results) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (results.poseLandmarks) {
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffd700', lineWidth: 3});
        drawLandmarks(ctx, results.poseLandmarks, {color: '#ff6b6b', lineWidth: 2, radius: 4});
        
        if (selectedChallenge === 'squat') detectSquat(results.poseLandmarks);
        else if (selectedChallenge === 'jumpingjack') detectJumpingJack(results.poseLandmarks);
      }
    }
    
    function detectSquat(landmarks) {
      if (!alarmActive) return;
      
      const leftHip = landmarks[23], leftKnee = landmarks[25], leftAnkle = landmarks[27];
      const rightHip = landmarks[24], rightKnee = landmarks[26], rightAnkle = landmarks[28];
      
      let hip, knee, ankle;
      const leftVis = (leftHip?.visibility||0) + (leftKnee?.visibility||0) + (leftAnkle?.visibility||0);
      const rightVis = (rightHip?.visibility||0) + (rightKnee?.visibility||0) + (rightAnkle?.visibility||0);
      
      if (leftVis >= rightVis) { hip = leftHip; knee = leftKnee; ankle = leftAnkle; }
      else { hip = rightHip; knee = rightKnee; ankle = rightAnkle; }
      
      if (!hip || !knee || !ankle) return;
      
      const angle = calculateAngle({x: hip.x, y: hip.y}, {x: knee.x, y: knee.y}, {x: ankle.x, y: ankle.y});
      
      if (angle < 100 && !inRep) { inRep = true; lastAngle = angle; }
      else if (angle > 160 && inRep && lastAngle < 100 && !repComplete) {
        repCount++; updateReps(); repComplete = true;
        if (repCount >= targetReps) alarmSolved();
      }
      else if (angle > 170) repComplete = false;
      if (angle > 120) lastAngle = angle;
    }
    
    function detectJumpingJack(landmarks) {
      if (!alarmActive) return;
      
      const leftWrist = landmarks[15], rightWrist = landmarks[16];
      const leftAnkle = landmarks[27], rightAnkle = landmarks[28];
      
      if (!leftWrist || !rightWrist || !leftAnkle || !rightAnkle) return;
      
      const armsUp = leftWrist.y < 0.3 && rightWrist.y < 0.3;
      const legsApart = Math.abs(leftAnkle.x - rightAnkle.x) > 0.3;
      
      if (armsUp && legsApart && !inRep) {
        inRep = true;
      } else if (!armsUp && !legsApart && inRep && !repComplete) {
        repCount++; updateReps(); repComplete = true;
        if (repCount >= targetReps) alarmSolved();
      } else if (armsUp && legsApart) {
        repComplete = false;
      }
    }
    
    function calculateAngle(a, b, c) {
      const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(rad * 180 / Math.PI);
      return angle > 180 ? 360 - angle : angle;
    }
    
    function updateReps() {
      countEl.textContent = repCount;
      progressEl.style.width = (repCount / targetReps * 100) + '%';
      messageEl.textContent = `${targetReps - repCount} more to go!`;
    }
    
    function alarmSolved() {
      stopAlarm();
      messageEl.textContent = '🎉 Done! Good morning!';
      messageEl.className = 'message success';
      videoContainer.style.display = 'none';
      stopBtn.classList.add('hidden');
      testBtn.classList.remove('hidden');
    }
    
    async function startAlarm() {
      alarmActive = true;
      repCount = 0;
      inRep = false; repComplete = false; lastAngle = null;
      
      countEl.textContent = '0';
      progressEl.style.width = '0%';
      messageEl.textContent = `🔔 ALARM! Do ${targetReps} ${selectedChallenge === 'jumpingjack' ? 'jumping jacks' : 'squats'}!`;
      messageEl.className = 'message alarm';
      
      testBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
      videoContainer.style.display = 'inline-block';
      
      try {
        initPose();
        camera = new Camera(video, {
          onFrame: async () => { if (pose) await pose.send({image: video}); },
          width: 480, height: 360
        });
        await camera.start();
        playAlarm();
      } catch (e) {
        messageEl.textContent = 'Error: ' + e.message;
      }
    }
    
    function stopAlarmHandler() {
      stopAlarm();
      messageEl.textContent = 'Alarm stopped. Click Test to try again.';
      messageEl.className = 'message waiting';
      videoContainer.style.display = 'none';
      stopBtn.classList.add('hidden');
      testBtn.classList.remove('hidden');
    }
    
    testBtn.addEventListener('click', startAlarm);
    stopBtn.addEventListener('click', stopAlarmHandler);
    
    // Quiz Logic
    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }
    
    function startQuiz() {
      currentQuestion = 0;
      quizScore = 0;
      qScore.textContent = '0';
      showQuestion();
    }
    
    function showQuestion() {
      const questions = shuffle([...mathQuestions]).slice(0, 5);
      window.currentQuizQuestions = questions;
      
      const q = questions[currentQuestion];
      
      qNum.textContent = currentQuestion + 1;
      qText.textContent = q.q;
      qOptions.innerHTML = '';
      quizMessage.textContent = '';
      quizAnswered = false;
      nextQBtn.classList.add('hidden');
      
      const shuffledOpts = shuffle([...q.options.map((opt, i) => ({text: opt, correct: i === q.correct}))]);
      
      shuffledOpts.forEach((opt) => {
        const btn = document.createElement('div');
        btn.className = 'quiz-option';
        btn.textContent = opt.text;
        btn.dataset.correct = opt.correct;
        btn.onclick = () => selectAnswer(opt.correct);
        qOptions.appendChild(btn);
      });
    }
    
    function selectAnswer(isCorrect) {
      if (quizAnswered) return;
      quizAnswered = true;
      
      const opts = qOptions.querySelectorAll('.quiz-option');
      opts.forEach(o => o.classList.add('disabled'));
      
      if (isCorrect) {
        quizScore++;
        qScore.textContent = quizScore;
        quizMessage.textContent = '✓ Correct!';
        quizMessage.className = 'message success';
      } else {
        quizMessage.textContent = '✗ Wrong!';
        quizMessage.className = 'message alarm';
      }
      
      if (currentQuestion < 4) {
        nextQBtn.classList.remove('hidden');
      } else {
        setTimeout(() => {
          if (quizScore >= 4) {
            quizMessage.textContent = `🎉 Great! ${quizScore}/5 - Alarm dismissed!`;
            quizMessage.className = 'message success';
          } else {
            quizMessage.textContent = `${quizScore}/5 - Need 4+ to pass`;
            restartQuizBtn.classList.remove('hidden');
          }
        }, 1000);
      }
    }
    
    nextQBtn.onclick = () => {
      currentQuestion++;
      showQuestion();
    };
    
    restartQuizBtn.onclick = () => {
      restartQuizBtn.classList.add('hidden');
      startQuiz();
    };
  </script>
</body>
</html>
